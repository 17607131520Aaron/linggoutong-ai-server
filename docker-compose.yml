version: '3.8'

services:
  app:
    build: .
    container_name: linggoutong-server
    ports:
      - "9000:9000"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=linggoutong
      - MYSQL_USERNAME=linggoutong
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-linggoutong123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DATABASE=linggoutong
      - MONGO_USERNAME=admin
      - MONGO_PASSWORD=${MONGO_PASSWORD:-mongo123}
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-must-be-at-least-32-chars-long}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    restart: unless-stopped
    networks:
      - linggoutong-network

  mysql:
    image: mysql:8.0
    container_name: linggoutong-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: linggoutong
      MYSQL_USER: linggoutong
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-linggoutong123}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - linggoutong-network

  redis:
    image: redis:7-alpine
    container_name: linggoutong-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - linggoutong-network

  mongodb:
    image: mongo:7
    container_name: linggoutong-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo123}
      MONGO_INITDB_DATABASE: linggoutong
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - linggoutong-network

volumes:
  mysql_data:
  redis_data:
  mongo_data:

networks:
  linggoutong-network:
    driver: bridge
