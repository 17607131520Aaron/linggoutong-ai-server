# ==================== 生产环境配置 ====================
spring:
  config:
    activate:
      on-profile: prod

  # MySQL
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:linggoutong}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:linggoutong}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: LinggoutongHikariCP

  # MongoDB & Redis
  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME:admin}:${MONGO_PASSWORD:}@${MONGO_HOST:mongodb}:${MONGO_PORT:27017}/${MONGO_DATABASE:linggoutong}?authSource=admin
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 3000ms

  # RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 10
        max-concurrency: 50
        prefetch: 5
      direct:
        acknowledge-mode: manual

  # 文件上传
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB
      enabled: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# JWT - 生产环境必须使用环境变量
jwt:
  secret: ${JWT_SECRET}

# 文件存储 - 生产环境推荐MinIO或OSS
file:
  storage-type: minio
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket-name: ${MINIO_BUCKET:linggoutong}

# Swagger - 生产环境关闭
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 日志级别
logging:
  level:
    root: WARN
    com.linggoutong.server: INFO
    org.springframework.security: WARN
